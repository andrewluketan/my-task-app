<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Task Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        :root { --milwaukee-red: #da291c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .category-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 30px; border-top: 6px solid var(--milwaukee-red); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .subtask-list { margin-left: 20px; border-left: 2px solid #eee; padding-left: 15px; }
        .subtask-item { display: flex; align-items: center; gap: 10px; padding: 6px; border-bottom: 1px solid #f0f0f0; }
        .btn { cursor: pointer; padding: 8px 15px; border: none; border-radius: 6px; font-weight: 600; }
        .btn-main { background: var(--milwaukee-red); color: white; }
        .btn-small { padding: 4px 8px; font-size: 11px; background: #eee; border: 1px solid #ddd; }
        .editor-container { background: #fff; height: 120px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
        <h1>Strategic Project Manager</h1>
        <button class="btn btn-main" onclick="addCategory()">+ New Category</button>
    </div>
    <div id="app-root"></div>
</div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let editors = {}; 

    async function addCategory() {
        const name = prompt("Enter Category Name:");
        if (name) await _supabase.from('categories').insert([{ name }]);
        refreshUI();
    }

    async function addSubTask(catId, parentId = null) {
        const text = prompt("Task description:");
        if (!text) return;
        await _supabase.from('subtasks').insert([{ 
            category_id: Number(catId), 
            parent_id: parentId ? Number(parentId) : null, 
            task_text: text 
        }]);
        refreshUI();
    }

    async function refreshUI() {
        const { data: cats, error } = await _supabase.from('categories').select('*').order('created_at', { ascending: false });
        if (error) { alert("Error loading categories: " + error.message); return; }

        const root = document.getElementById('app-root');
        root.innerHTML = '';

        for (const cat of cats) {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerHTML = `
                <h2>${cat.name}</h2>
                <div id="editor-${cat.id}" class="editor-container">${cat.notes || ''}</div>
                <button class="btn btn-small" onclick="saveNotes(${cat.id})">Save Notes</button>
                <hr style="margin:20px 0;">
                <div id="tasks-for-${cat.id}">Checking for tasks...</div>
                <button class="btn btn-main" style="margin-top:15px; font-size:12px;" onclick="addSubTask(${cat.id})">+ Add Main Task</button>
            `;
            root.appendChild(card);
            
            editors[cat.id] = new Quill(`#editor-${cat.id}`, { theme: 'snow', modules: { toolbar: false } });

            // Trigger the task load
            loadTasks(cat.id);
        }
    }

    async function loadTasks(catId) {
        const { data: tasks, error } = await _supabase.from('subtasks')
            .select('*')
            .eq('category_id', Number(catId))
            .is('parent_id', null)
            .order('created_at', { ascending: true });

        const container = document.getElementById(`tasks-for-${catId}`);
        if (error) {
            container.innerHTML = `<span style="color:red">Error: ${error.message}</span>`;
            return;
        }

        if (tasks.length === 0) {
            container.innerHTML = '<p style="color:#aaa; font-size:12px;">No tasks found in database.</p>';
        } else {
            container.innerHTML = tasks.map(t => `<div class="subtask-item"><span>${t.task_text}</span></div>`).join('');
        }
    }

    refreshUI();
</script>
</body>
</html>
