<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Task Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --milwaukee-red: #da291c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        .category-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 30px; border-top: 6px solid var(--milwaukee-red); }
        .btn { cursor: pointer; padding: 8px 15px; border: none; border-radius: 6px; font-weight: 600; background: var(--milwaukee-red); color: white; }
        .empty-state { text-align: center; margin-top: 50px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
        <h1>Strategic Project Manager</h1>
        <button class="btn" onclick="addCategory()">+ New Category</button>
    </div>
    <div id="app-root"></div>
</div>

<script>
    // --- CONFIGURATION ---
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co';
    const SUPABASE_KEY = 'PASTE_YOUR_ANON_KEY_HERE'; // Ensure this is your public anon key
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- (1) Add Category with Error Feedback ---
    async function addCategory() {
        const name = prompt("Enter Category Name:");
        if (!name) return;

        console.log("Attempting to save category:", name);
        const { data, error } = await _supabase.from('Categories').insert([{ name }]).select();
        
        if (error) {
            alert("Database Error: " + error.message);
            console.error("Insert Error:", error);
        } else {
            console.log("Successfully saved:", data);
            refreshUI();
        }
    }

    // --- (7) Load and Render ---
    async function refreshUI() {
        console.log("Refreshing UI...");
        const { data: cats, error } = await _supabase.from('Categories').select('*').order('created_at', { ascending: false });
        
        if (error) {
            console.error("Fetch Error:", error);
            return;
        }

        const root = document.getElementById('app-root');
        if (!cats || cats.length === 0) {
            root.innerHTML = '<div class="empty-state"><h3>No projects yet.</h3><p>Click "+ New Category" to organize your workshop or business tasks.</p></div>';
            return;
        }

        root.innerHTML = cats.map(cat => `
            <div class="category-card">
                <h2>${cat.name}</h2>
                <p style="font-size: 0.8rem; color: #888;">Started: ${new Date(cat.created_at).toLocaleDateString()}</p>
                <hr>
                <p>Tasks will appear here once added.</p>
            </div>
        `).join('');
    }

    // Initial load
    refreshUI();
</script>
</body>
</html>
