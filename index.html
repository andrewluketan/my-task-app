<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Task Manager | MS To-Do Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --sidebar-bg: #f3f4f6; --main-blue: #4b69ff; --border: #e5e7eb; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: white; overflow: hidden; }

        /* Column 1: Navigation Sidebar */
        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-item { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #374151; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .sidebar-item:hover { background: #e5e7eb; }
        .sidebar-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 600; border-left: 4px solid var(--main-blue); }

        /* Column 2: Task List (Center) */
        #main-content { flex: 1; display: flex; flex-direction: column; background: var(--main-blue); color: white; min-width: 400px; }
        #task-list-header { padding: 30px 40px 10px 40px; font-size: 24px; font-weight: bold; }
        #task-items-container { flex: 1; padding: 10px 40px; overflow-y: auto; }
        
        .task-row { 
            background: white; color: #333; margin-bottom: 2px; padding: 14px 16px; 
            border-radius: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .task-row:hover { background: #fcfcfc; }
        .circle-check { width: 18px; height: 18px; border: 1px solid #ccc; border-radius: 50%; }

        /* Column 3: Detail Pane (Right) */
        #detail-pane { width: 400px; background: #fafafa; border-left: 1px solid var(--border); display: none; flex-direction: column; padding: 0; box-shadow: -2px 0 10px rgba(0,0,0,0.05); }
        .detail-header { padding: 25px 20px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: flex-start; gap: 15px; }
        .detail-scroll-area { flex: 1; overflow-y: auto; padding: 20px; }
        
        .detail-section { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 12px; padding: 4px 0; }
        .detail-item { display: flex; align-items: center; gap: 15px; padding: 12px 16px; font-size: 14px; color: #444; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
        .detail-item:last-child { border-bottom: none; }
        .detail-item:hover { background: #f9f9f9; }
        
        .sub-step-row { display: flex; align-items: center; gap: 10px; padding: 8px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }

        #add-task-footer { padding: 20px 40px; background: rgba(0,0,0,0.1); }
        .footer-input { width: 100%; padding: 12px; background: transparent; border: none; color: white; font-size: 15px; outline: none; }
        .footer-input::placeholder { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>

    <!-- Column 1: Lists -->
    <div id="sidebar">
        <div style="padding: 20px;"><input type="text" placeholder="Search" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;"></div>
        <div id="category-list"></div>
        <div style="margin-top:auto; border-top:1px solid #ddd; padding:10px;">
            <button class="sidebar-item" onclick="addCategory()" style="background:none; border:none; width:100%; text-align:left; font-weight:600; color:var(--main-blue);">+ New List</button>
        </div>
    </div>

    <!-- Column 2: Specific Tasks -->
    <div id="main-content">
        <div id="task-list-header">Tasks</div>
        <div id="task-items-container"></div>
        <div id="add-task-footer">
            <input type="text" class="footer-input" id="new-task-input" placeholder="+ Add a task" onkeypress="handleNewTask(event)">
        </div>
    </div>

    <!-- Column 3: Task "Steps" and Metadata -->
    <div id="detail-pane">
        <div class="detail-header">
            <div class="circle-check"></div>
            <div style="flex:1;">
                <h2 id="detail-task-title" style="margin:0; font-size:18px;"></h2>
            </div>
            <button onclick="closeDetails()" style="border:none; background:none; cursor:pointer; font-size:18px;">✕</button>
        </div>
        
        <div class="detail-scroll-area">
            <div class="detail-section" id="steps-container">
                <div id="sub-steps-list"></div>
                <div class="detail-item" style="color:var(--main-blue);" onclick="promptAddStep()">+ Add step</div>
            </div>

            <div class="detail-section">
                <div class="detail-item"><span>🔆</span> Add to My Day</div>
            </div>

            <div class="detail-section">
                <div class="detail-item"><span>⏰</span> Remind me</div>
                <div class="detail-item"><span>📅</span> Add due date</div>
                <div class="detail-item"><span>🔁</span> Repeat</div>
            </div>

            <div class="detail-section">
                <div class="detail-item"><span>📎</span> Add file</div>
            </div>

            <div class="detail-section">
                <textarea id="task-notes" placeholder="Add note" style="width:100%; min-height:100px; border:none; padding:15px; outline:none; font-family:inherit; box-sizing:border-box;" onchange="saveNotes()"></textarea>
            </div>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentCategoryId = null;
    let currentTaskId = null;

    // 1. Categories (Left)
    async function refreshCategories() {
        const { data } = await _supabase.from('categories').select('*').order('created_at', { ascending: true });
        const list = document.getElementById('category-list');
        list.innerHTML = data.map(cat => `
            <div class="sidebar-item ${currentCategoryId == cat.id ? 'active' : ''}" onclick="selectCategory(${cat.id}, '${cat.name.replace(/'/g, "\\'")}')">
                <span>📋</span> ${cat.name}
            </div>
        `).join('');
    }

    async function selectCategory(id, name) {
        currentCategoryId = id;
        document.getElementById('task-list-header').innerText = name;
        closeDetails();
        refreshCategories();
        refreshTasks();
    }

    // 2. Tasks (Center)
    async function refreshTasks() {
        if (!currentCategoryId) return;
        const { data } = await _supabase.from('subtasks').select('*').eq('category_id', currentCategoryId).is('parent_id', null).order('position', { ascending: true });
        const container = document.getElementById('task-items-container');
        container.innerHTML = data.map(task => `
            <div class="task-row" onclick="openDetails(${task.id}, '${task.task_text.replace(/'/g, "\\'")}')">
                <div class="circle-check"></div>
                <span style="flex:1;">${task.task_text}</span>
            </div>
        `).join('');
    }

    async function handleNewTask(e) {
        if (e.key === 'Enter' && currentCategoryId) {
            const val = e.target.value;
            await _supabase.from('subtasks').insert([{ category_id: currentCategoryId, task_text: val }]);
            e.target.value = '';
            refreshTasks();
        }
    }

    // 3. Details (Right)
    async function openDetails(id, title) {
        currentTaskId = id;
        document.getElementById('detail-task-title').innerText = title;
        document.getElementById('detail-pane').style.display = 'flex';
        
        // Fetch Notes
        const { data: task } = await _supabase.from('subtasks').select('notes').eq('id', id).single();
        document.getElementById('task-notes').value = task.notes || '';
        
        refreshSteps();
    }

    async function refreshSteps() {
        const { data } = await _supabase.from('subtasks').select('*').eq('parent_id', currentTaskId).order('created_at', { ascending: true });
        const list = document.getElementById('sub-steps-list');
        list.innerHTML = data.map(step => `
            <div class="sub-step-row">
                <div class="circle-check" style="width:14px; height:14px;"></div>
                <span>${step.task_text}</span>
            </div>
        `).join('');
    }

    async function promptAddStep() {
        const val = prompt("Step description:");
        if (val) {
            await _supabase.from('subtasks').insert([{ category_id: currentCategoryId, parent_id: currentTaskId, task_text: val }]);
            refreshSteps();
        }
    }

    async function saveNotes() {
        const val = document.getElementById('task-notes').value;
        await _supabase.from('subtasks').update({ notes: val }).eq('id', currentTaskId);
    }

    function closeDetails() { document.getElementById('detail-pane').style.display = 'none'; }

    async function addCategory() {
        const name = prompt("List name:");
        if (name) { await _supabase.from('categories').insert([{ name }]); refreshCategories(); }
    }

    refreshCategories();
</script>
</body>
</html>
