<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Task Manager | Pro Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --sidebar-bg: #f3f4f6; --main-blue: #4b69ff; --border: #e5e7eb; --red: #dc2626; --text: #444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: white; overflow: hidden; font-size: 14px; }

        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding-bottom: 60px; flex-shrink: 0; }
        #main-content { width: 350px; display: flex; flex-direction: column; background: var(--main-blue); color: white; border-right: 1px solid rgba(0,0,0,0.1); padding-bottom: 60px; flex-shrink: 0; position: relative; }
        #detail-pane { flex: 1; min-width: 400px; background: #fafafa; border-left: 1px solid var(--border); display: none; flex-direction: column; padding-bottom: 60px; overflow-y: auto;}

        .sidebar-item { padding: 14px 20px; cursor: pointer; font-size: 16px; color: #374151; display: flex; align-items: center; justify-content: space-between; gap: 10px; position: relative; }
        .sidebar-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; border-left: 5px solid var(--main-blue); }

        #task-list-header { padding: 30px 25px 10px 25px; font-size: 22px; font-weight: bold; }
        
        /* CONTAINER FIX: Ensure children can move freely */
        #task-items-container { 
            flex: 1; 
            padding: 10px 25px; 
            overflow-y: auto; 
            min-height: 300px; 
            display: block !important; 
        }
        
        .task-row { 
            background: white; 
            color: #333; 
            margin-bottom: 12px; /* Large gaps for easier dropping */
            padding: 12px 16px; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: default; 
            border: 1px solid #eee;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* LANDING ZONE VISUALS */
        .sortable-ghost { 
            opacity: 0.2; 
            background: #cbd5e1 !important; 
            border: 2px dashed var(--main-blue) !important;
            height: 50px; /* Forces a physical "hole" to appear */
        }
        .sortable-chosen { background: #f8fafc !important; }
        .sortable-drag { 
            z-index: 9999 !important; 
            opacity: 0.9;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .drag-handle { cursor: grab; padding: 10px; color: #ccc; font-size: 20px; }
        .circle-check { width: 18px; height: 18px; border: 1px solid #ccc; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
        .circle-check.checked { background: #4caf50; border-color: #4caf50; }
        .editable-text { outline: none; padding: 2px 6px; flex: 1; }
        .red-arrow { font-size: 18px; color: var(--red); font-weight: bold; cursor: pointer; padding: 0 5px; }

        #global-actions { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: white; border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 1000; }
        .btn-bottom { background: none; border: none; cursor: pointer; font-weight: 700; font-size: 14px; color: var(--main-blue); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px;"><input type="text" placeholder="Search" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;"></div>
        <div id="category-list"></div>
    </div>
    <div class="resizer" id="resizer1"></div>

    <div id="main-content">
        <div id="task-list-header">Tasks</div>
        <div id="task-items-container"></div>
    </div>
    <div class="resizer" id="resizer2"></div>

    <div id="detail-pane">
        <div class="detail-header">
            <div id="detail-task-title" class="editable-text" contenteditable="true" style="font-size:20px; font-weight:bold;"></div>
            <button onclick="closeDetails()" style="border:none; background:none; cursor:pointer; font-size:20px; margin-left: auto;">✕</button>
        </div>
        <div class="detail-scroll-area">
            <div id="editor-wrapper"><div id="notes-editor" style="height:250px;"></div></div>
        </div>
    </div>

    <div id="global-actions">
        <div style="width: 280px; padding-left: 20px;"><button class="btn-bottom" onclick="addCategory()">+ New List</button></div>
        <div style="width: 350px; padding-left: 20px;"><button class="btn-bottom" onclick="promptAddTask()">+ Add A Task</button></div>
        <div style="flex: 1; display: flex; justify-content: flex-end; padding-right: 20px;"><button class="btn-bottom" style="color:var(--red);" onclick="saveNotes()">Save Notes</button></div>
    </div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentCategoryId = null, currentTaskId = null, quill = null;

    quill = new Quill('#notes-editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }]] }, placeholder: '+ Add Notes' });

    async function selectCategory(id, name) { 
        currentCategoryId = id; 
        document.getElementById('task-list-header').innerText = name;
        refreshTasks(); 
        refreshCategories(); 
        closeDetails(); 
    }

    async function refreshTasks() {
        if (!currentCategoryId) return;
        const { data } = await _supabase.from('subtasks')
            .select('*')
            .eq('category_id', currentCategoryId)
            .is('parent_id', null)
            .order('position', { ascending: true });

        const container = document.getElementById('task-items-container');
        container.innerHTML = data.map(t => `
            <div class="task-row ${currentTaskId == t.id ? 'active-task' : ''}" data-id="${t.id}">
                <div class="drag-handle">⋮⋮</div>
                <div class="circle-check ${t.is_completed ? 'checked' : ''}" onclick="toggleCheck(${t.id}, ${t.is_completed})"></div>
                <div class="editable-text" contenteditable="true" onblur="updateTaskText(${t.id}, this)">${t.task_text}</div>
                <div class="red-arrow" onclick="openDetails(${t.id}, '${t.task_text.replace(/'/g, "\\'")}')">&gt;</div>
            </div>`).join('');

        // FORCED REFLOW INITIALIZATION
        Sortable.create(container, {
            handle: '.drag-handle',
            animation: 200,
            forceFallback: true,
            swapThreshold: 1, // Highest sensitivity
            invertSwap: true,
            delay: 50, // Prevents accidental trigger
            ghostClass: 'sortable-ghost',
            onEnd: async function () {
                const rows = container.querySelectorAll('.task-row');
                const updates = Array.from(rows).map((row, index) => {
                    return _supabase.from('subtasks').update({ position: index + 1 }).eq('id', row.getAttribute('data-id'));
                });
                await Promise.all(updates);
                console.log("Positions synced.");
            }
        });
    }

    async function refreshCategories() {
        const { data } = await _supabase.from('categories').select('*').order('created_at', { ascending: true });
        document.getElementById('category-list').innerHTML = data.map(c => `
            <div class="sidebar-item ${currentCategoryId == c.id ? 'active' : ''}" onclick="selectCategory(${c.id}, '${c.name.replace(/'/g, "\\'")}')">
                <span>📋 ${c.name}</span>
            </div>`).join('');
    }

    async function updateTaskText(id, el) { await _supabase.from('subtasks').update({ task_text: el.innerText }).eq('id', id); }
    async function toggleCheck(id, s) { await _supabase.from('subtasks').update({ is_completed: !s }).eq('id', id); refreshTasks(); }
    async function promptAddTask() { const v = prompt("New Task:"); if(v) { await _supabase.from('subtasks').insert([{ category_id: currentCategoryId, task_text: v, position: 999 }]); refreshTasks(); } }
    async function addCategory() { const n = prompt("List name:"); if(n) { await _supabase.from('categories').insert([{ name: n }]); refreshCategories(); } }
    
    async function openDetails(id, title) {
        currentTaskId = id;
        document.querySelectorAll('.task-row').forEach(r => r.classList.remove('active-task'));
        const row = document.querySelector(`.task-row[data-id="${id}"]`);
        if(row) row.classList.add('active-task');
        document.getElementById('detail-task-title').innerText = title;
        document.getElementById('detail-pane').style.display = 'flex';
        const { data } = await _supabase.from('subtasks').select('*').eq('id', id).single();
        if(data) quill.root.innerHTML = data.notes || '';
    }
    
    function closeDetails() { document.getElementById('detail-pane').style.display = 'none'; currentTaskId = null; refreshTasks(); }
    async function saveNotes() { if(!currentTaskId) return; await _supabase.from('subtasks').update({ notes: quill.root.innerHTML }).eq('id', currentTaskId); alert("Notes saved."); }
    
    refreshCategories();
</script>
</body>
</html>
