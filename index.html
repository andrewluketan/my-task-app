<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Task Manager | Pro Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --sidebar-bg: #f3f4f6; --main-blue: #4b69ff; --border: #e5e7eb; --red: #dc2626; --text: #444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; width: 100vw; height: 100vh; background: white; overflow: hidden; }

        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        #main-content { width: 350px; background: var(--main-blue); color: white; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; position: relative; }
        #detail-pane { flex: 1; background: #fafafa; border-left: 1px solid var(--border); display: none; flex-direction: column; overflow-y: auto; }

        /* GAP BUFFER */
        #category-list, #task-items-container, .detail-scroll-area { padding-bottom: 120px !important; }

        .sidebar-item { padding: 14px 20px; cursor: pointer; font-size: 16px; color: #374151; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .sidebar-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; border-left: 5px solid var(--main-blue); }

        #task-list-header { padding: 30px 25px 10px 25px; font-size: 22px; font-weight: bold; }
        .task-row { background: white; color: #333; margin-bottom: 12px; padding: 12px 16px; border-radius: 4px; display: flex; align-items: center; gap: 12px; border: 1px solid #eee; position: relative; user-select: none; }
        
        /* NESTED STEPS STYLING */
        .steps-header { font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .step-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: white; border: 1px solid #f0f0f0; border-radius: 4px; margin-bottom: 5px; }
        .step-check { width: 18px; height: 18px; border: 1px solid #ccc; border-radius: 50%; cursor: pointer; flex-shrink: 0; }
        .step-check.checked { background: #4caf50; border-color: #4caf50; }
        .step-text { flex: 1; font-size: 14px; }
        .step-text.done { text-decoration: line-through; color: #999; }

        .detail-section { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; padding: 10px; }
        .detail-item { display: flex; align-items: center; gap: 15px; padding: 10px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #f9f9f9; }
        .date-display { margin-left: auto; color: var(--main-blue); font-weight: 600; font-size: 12px; }

        #global-actions { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: white; border-top: 2px solid var(--border); display: flex; align-items: center; z-index: 10000; box-shadow: 0 -3px 15px rgba(0,0,0,0.1); }
        .action-cell { flex: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid #eee; }
        .btn-bottom { background: none; border: none; cursor: pointer; font-weight: 700; font-size: 14px; color: var(--main-blue); }

        .drag-handle { cursor: grab; padding: 10px; color: #ccc; font-size: 20px; }
        .red-arrow { font-size: 18px; color: var(--red); font-weight: bold; cursor: pointer; margin-left: auto; }

        @media (max-width: 900px) { body { overflow-x: auto; } #sidebar, #main-content { min-width: 280px; } #detail-pane { min-width: 320px; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px;"><input type="text" placeholder="Search" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;"></div>
        <div id="category-list"></div>
    </div>

    <div id="main-content">
        <div id="task-list-header">Select a List</div>
        <div id="task-items-container"></div>
    </div>

    <div id="detail-pane">
        <div class="detail-header" style="padding:20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #eee;">
            <div id="detail-task-title" class="editable-text" contenteditable="true" style="font-size:18px; font-weight:bold;" onblur="updateTaskText(currentTaskId, this)"></div>
            <button onclick="closeDetails()" style="border:none; background:none; cursor:pointer; font-size:24px; margin-left:auto;">✕</button>
        </div>
        
        <div class="detail-scroll-area" style="padding:20px;">
            <!-- META SECTION -->
            <div class="detail-section">
                <div class="detail-item" onclick="promptDate('remind_at')"><span>⏰</span> Remind me <span id="remind-val" class="date-display">None</span></div>
                <div class="detail-item" onclick="promptDate('due_at')"><span>📅</span> Add due date <span id="due-val" class="date-display">None</span></div>
            </div>

            <!-- NESTED STEPS SECTION -->
            <div class="detail-section">
                <div class="steps-header">
                    Steps <button onclick="addStep()" style="border:none; background:none; color:var(--main-blue); cursor:pointer; font-weight:bold;">+ Add Step</button>
                </div>
                <div id="steps-container"></div>
            </div>

            <!-- ATTACHMENTS SECTION -->
            <div class="detail-section">
                <div class="steps-header">Attachments</div>
                <button onclick="document.getElementById('file-input').click()" style="width:100%; padding:8px; border:1px dashed #ccc; background:#f9f9f9; border-radius:4px; cursor:pointer; margin-bottom:10px;">📎 Upload File</button>
                <input type="file" id="file-input" style="display:none" onchange="uploadFile(this)">
                <div id="file-list-display"></div>
            </div>

            <!-- NOTES EDITOR -->
            <div id="editor-wrapper"><div id="notes-editor" style="height:200px; background:white;"></div></div>
        </div>
    </div>

    <div id="global-actions">
        <div class="action-cell"><button class="btn-bottom" onclick="addCategory()">+ New List</button></div>
        <div class="action-cell"><button class="btn-bottom" onclick="promptAddTask()">+ Add Task</button></div>
        <div class="action-cell" style="border-right:none;"><button class="btn-bottom" style="color:var(--red);" onclick="saveNotes()">Save Notes</button></div>
    </div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentCategoryId = null, currentTaskId = null, quill = null;

    quill = new Quill('#notes-editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }]] }, placeholder: '+ Add Notes' });

    async function selectCategory(id, name) { 
        currentCategoryId = id; 
        document.getElementById('task-list-header').innerText = name;
        refreshTasks(); 
        refreshCategories(); 
        closeDetails();
    }

    async function refreshTasks() {
        if (!currentCategoryId) return;
        const { data } = await _supabase.from('subtasks').select('*').eq('category_id', currentCategoryId).is('parent_id', null).order('position', { ascending: true });
        const container = document.getElementById('task-items-container');
        container.innerHTML = data.map(t => `
            <div class="task-row" data-id="${t.id}">
                <div class="drag-handle">⋮⋮</div>
                <div class="editable-text" contenteditable="true" onblur="updateTaskText(${t.id}, this)">${t.task_text}</div>
                <div class="red-arrow" onclick="openDetails(${t.id}, '${t.task_text.replace(/'/g, "\\'")}')">&gt;</div>
            </div>`).join('');

        Sortable.create(container, {
            handle: '.drag-handle', animation: 200, forceFallback: true, swapThreshold: 1,
            onMove: (evt) => evt.related.className.indexOf('task-row') !== -1,
            onEnd: async function () {
                const rows = container.querySelectorAll('.task-row');
                const updates = Array.from(rows).map((row, index) => _supabase.from('subtasks').update({ position: index + 1 }).eq('id', row.getAttribute('data-id')));
                await Promise.all(updates);
            }
        });
    }

    async function openDetails(id, title) {
        currentTaskId = id;
        document.getElementById('detail-task-title').innerText = title;
        document.getElementById('detail-pane').style.display = 'flex';
        const { data } = await _supabase.from('subtasks').select('*').eq('id', id).single();
        if(data) {
            quill.root.innerHTML = data.notes || '';
            document.getElementById('remind-val').innerText = data.remind_at || 'None';
            document.getElementById('due-val').innerText = data.due_at || 'None';
            refreshSteps();
            refreshFiles();
        }
    }

    async function refreshSteps() {
        if (!currentTaskId) return;
        const { data } = await _supabase.from('subtasks').select('*').eq('parent_id', currentTaskId).order('position', { ascending: true });
        document.getElementById('steps-container').innerHTML = data.map(s => `
            <div class="step-item">
                <div class="step-check ${s.is_completed ? 'checked' : ''}" onclick="toggleStep(${s.id}, ${s.is_completed})"></div>
                <div class="step-text ${s.is_completed ? 'done' : ''}">${s.task_text}</div>
            </div>`).join('');
    }

    async function addStep() {
        const v = prompt("Step name:");
        if(v && currentTaskId) {
            await _supabase.from('subtasks').insert([{ parent_id: currentTaskId, category_id: currentCategoryId, task_text: v, position: 999 }]);
            refreshSteps();
        }
    }

    async function toggleStep(id, currentStatus) {
        await _supabase.from('subtasks').update({ is_completed: !currentStatus }).eq('id', id);
        refreshSteps();
    }

    async function promptDate(column) {
        const val = prompt("Enter Date (YYYY-MM-DD):");
        if(val) {
            await _supabase.from('subtasks').update({ [column]: val }).eq('id', currentTaskId);
            document.getElementById(column === 'due_at' ? 'due-val' : 'remind-val').innerText = val;
        }
    }

    async function uploadFile(input) {
        const file = input.files[0];
        if(!file || !currentTaskId) return;
        const path = `task_${currentTaskId}/${Date.now()}_${file.name}`;
        const { error } = await _supabase.storage.from('task-attachments').upload(path, file);
        if(!error) {
            await _supabase.from('task_files').insert([{ task_id: currentTaskId, file_name: file.name, file_path: path }]);
            refreshFiles();
        }
    }

    async function refreshFiles() {
        const { data } = await _supabase.from('task_files').select('*').eq('task_id', currentTaskId);
        document.getElementById('file-list-display').innerHTML = data.map(f => `
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px; background:#fff; padding:5px; border:1px solid #eee;">
                <span>📄 ${f.file_name}</span>
                <button onclick="deleteFile(${f.id}, '${f.file_path}')" style="color:red; border:none; background:none; cursor:pointer;">DEL</button>
            </div>`).join('');
    }

    async function refreshCategories() {
        const { data } = await _supabase.from('categories').select('*').order('created_at', { ascending: true });
        document.getElementById('category-list').innerHTML = data.map(c => `
            <div class="sidebar-item ${currentCategoryId == c.id ? 'active' : ''}" onclick="selectCategory(${c.id}, '${c.name.replace(/'/g, "\\'")}')">📋 ${c.name}</div>
        `).join('');
    }

    async function updateTaskText(id, el) { if(id) await _supabase.from('subtasks').update({ task_text: el.innerText }).eq('id', id); }
    async function saveNotes() { if(!currentTaskId) return; await _supabase.from('subtasks').update({ notes: quill.root.innerHTML }).eq('id', currentTaskId); alert("Saved."); }
    function closeDetails() { document.getElementById('detail-pane').style.display = 'none'; currentTaskId = null; }
    async function addCategory() { const n = prompt("List name:"); if(n) { await _supabase.from('categories').insert([{ name: n }]); refreshCategories(); } }
    async function promptAddTask() { const v = prompt("New Task:"); if(v) { await _supabase.from('subtasks').insert([{ category_id: currentCategoryId, task_text: v, position: 999 }]); refreshTasks(); } }

    refreshCategories();
</script>
</body>
</html>
