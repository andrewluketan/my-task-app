<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Task Manager | UX Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --sidebar-bg: #f3f4f6; --main-blue: #4b69ff; --border: #e5e7eb; --red: #dc2626; --text: #444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: white; overflow: hidden; font-size: 14px; }

        /* Columns */
        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding-bottom: 60px; flex-shrink: 0; }
        #main-content { width: 350px; display: flex; flex-direction: column; background: var(--main-blue); color: white; border-right: 1px solid rgba(0,0,0,0.1); padding-bottom: 60px; flex-shrink: 0; position: relative; }
        #detail-pane { flex: 1; min-width: 400px; background: #fafafa; border-left: 1px solid var(--border); display: none; flex-direction: column; padding-bottom: 60px; }

        /* Sidebar Nav */
        .sidebar-item { padding: 14px 20px; cursor: pointer; font-size: 16px; color: #374151; display: flex; align-items: center; gap: 10px; }
        .sidebar-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; border-left: 5px solid var(--main-blue); }

        /* Task Items */
        #task-list-header { padding: 30px 25px 10px 25px; font-size: 22px; font-weight: bold; }
        #task-items-container { flex: 1; padding: 10px 25px; overflow-y: auto; }
        .task-row { background: white; color: #333; margin-bottom: 2px; padding: 12px 16px; border-radius: 4px; display: flex; align-items: center; gap: 12px; }
        .circle-check { width: 18px; height: 18px; border: 1px solid #ccc; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
        .circle-check.checked { background: #4caf50; border-color: #4caf50; }
        .editable-text { outline: none; padding: 2px 6px; border-radius: 2px; cursor: text; flex: 1; width: fit-content; min-width: 20px; }
        .red-arrow { font-size: 18px; color: var(--red); font-weight: bold; cursor: pointer; padding: 0 5px; user-select: none; }

        /* Tree Steps */
        .detail-header { padding: 25px 30px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .detail-scroll-area { flex: 1; overflow-y: auto; padding: 25px 30px; }
        .tree-container { margin-left: 20px; border-left: 1px solid #eee; padding-left: 10px; min-height: 5px; }
        .step-item { display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-bottom: 1px solid #f0f0f0; background: white; position: relative; }

        /* Scheduling */
        .detail-section { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; padding: 4px 0; }
        .detail-item { display: flex; align-items: center; gap: 15px; padding: 12px 20px; font-size: 14px; color: var(--text); border-bottom: 1px solid #f3f4f6; cursor: pointer; position: relative; }
        .datepicker-menu { position: absolute; top: 100%; left: 10px; width: 280px; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; z-index: 100; padding: 8px 0; }
        
        /* Bottom Global Actions */
        #global-actions { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: white; border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 1000; }
        .action-cell { height: 100%; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .btn-bottom { background: none; border: none; cursor: pointer; font-weight: 700; font-size: 14px; }
        
        .resizer { width: 6px; cursor: col-resize; background: transparent; flex-shrink: 0; z-index: 10; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px;"><input type="text" placeholder="Search" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;"></div>
        <div id="category-list"></div>
    </div>
    <div class="resizer" id="resizer1"></div>

    <div id="main-content">
        <div id="task-list-header">Tasks</div>
        <div id="task-items-container" data-parent-id="null"></div>
    </div>
    <div class="resizer" id="resizer2"></div>

    <div id="detail-pane">
        <div class="detail-header">
            <div class="circle-check" id="detail-check"></div>
            <div id="detail-task-title" class="editable-text" contenteditable="true" style="font-size:20px; font-weight:bold;" onblur="updateTaskText(currentTaskId, this)"></div>
            <button onclick="closeDetails()" style="border:none; background:none; cursor:pointer; font-size:20px; margin-left: auto;">✕</button>
        </div>
        <div class="detail-scroll-area">
            <div class="detail-section">
                <div id="recursive-steps-root" data-parent-id="null"></div>
                <div style="color:var(--main-blue); font-weight:700; padding:12px 20px; cursor:pointer;" onclick="promptAddStep()">+ Add step</div>
            </div>
            <div class="detail-section">
                <div class="detail-item" onclick="toggleMenu('remind-menu')"><span>⏰</span> Remind me <div id="remind-menu" class="datepicker-menu">...</div></div>
                <div class="detail-item"><span>📅</span> Add due date</div>
                <div class="detail-item"><span>📎</span> Add file</div>
            </div>
            <div id="editor-wrapper" style="margin-top:15px;"><div id="notes-editor"></div></div>
        </div>
    </div>

    <div id="global-actions">
        <div class="action-cell" style="width: 280px;"><button class="btn-bottom" style="color:var(--main-blue);" onclick="addCategory()">+ New List</button></div>
        <div class="action-cell" style="width: 350px;"><button class="btn-bottom" style="color:var(--main-blue);" onclick="promptAddTask()">+ Add A Task</button></div>
        <div class="action-cell" style="flex: 1; justify-content: flex-end;"><button class="btn-bottom" style="color:var(--red);" onclick="saveNotes()">Save Notes</button></div>
    </div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentCategoryId = null, currentTaskId = null, quill = null;

    async function loadTree(catId, parentId, containerId) {
        const query = _supabase.from('subtasks').select('*').eq('category_id', catId);
        if(parentId === "null") query.is('parent_id', null); else query.eq('parent_id', Number(parentId));
        const { data } = await query.order('position', { ascending: true });
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if(!data) return;
        data.forEach(s => {
            const row = document.createElement('div');
            row.className = 'step-item';
            row.setAttribute('data-id', s.id);
            row.innerHTML = `<div class="drag-handle">⋮⋮</div><div class="circle-check ${s.is_completed ? 'checked' : ''}"></div><div class="editable-text" contenteditable="true" onblur="updateTaskText(${s.id}, this)">${s.task_text}</div>`;
            const tree = document.createElement('div');
            tree.className = 'tree-container';
            tree.id = `tree-${s.id}`;
            container.appendChild(row);
            container.appendChild(tree);
            loadTree(catId, s.id, tree.id);
        });
        new Sortable(container, { group: 'nested', animation: 150, handle: '.drag-handle' });
    }

    async function refreshTasks() {
        const { data } = await _supabase.from('subtasks').select('*').eq('category_id', currentCategoryId).is('parent_id', null).order('position', { ascending: true });
        document.getElementById('task-items-container').innerHTML = data.map(t => `
            <div class="task-row" data-id="${t.id}">
                <div class="drag-handle">⋮⋮</div>
                <div class="circle-check ${t.is_completed ? 'checked' : ''}"></div>
                <div class="editable-text" contenteditable="true" onblur="updateTaskText(${t.id}, this)">${t.task_text}</div>
                <div class="red-arrow" onclick="openDetails(${t.id}, '${t.task_text.replace(/'/g, "\\'")}')">&gt;</div>
            </div>`).join('');
    }

    async function openDetails(id, title) {
        currentTaskId = id;
        document.getElementById('detail-task-title').innerText = title;
        document.getElementById('detail-pane').style.display = 'flex';
        const { data } = await _supabase.from('subtasks').select('notes').eq('id', id).single();
        if (quill) quill.root.innerHTML = data.notes || '';
        loadTree(currentCategoryId, id, 'recursive-steps-root');
    }

    async function refreshCategories() {
        const { data } = await _supabase.from('categories').select('*').order('created_at', { ascending: true });
        document.getElementById('category-list').innerHTML = data.map(c => `<div class="sidebar-item ${currentCategoryId == c.id ? 'active' : ''}" onclick="selectCategory(${c.id}, '${c.name.replace(/'/g, "\\'")}')">📋 ${c.name}</div>`).join('');
        if(!currentCategoryId && data.length > 0) selectCategory(data[0].id, data[0].name);
    }

    function selectCategory(id, name) { currentCategoryId = id; document.getElementById('task-list-header').innerText = name; refreshTasks(); refreshCategories(); closeDetails(); }
    function closeDetails() { document.getElementById('detail-pane').style.display = 'none'; }
    
    quill = new Quill('#notes-editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }]] } });
    async function saveNotes() { if(currentTaskId) { await _supabase.from('subtasks').update({ notes: quill.root.innerHTML }).eq('id', currentTaskId); alert("Notes saved."); } }
    
    function makeResizable(r, c) { let x=0, w=0; r.addEventListener('mousedown', (e)=>{ x=e.clientX; w=c.getBoundingClientRect().width;
        const m=(e)=>{c.style.width=`${w+(e.clientX-x)}px`}; const s=()=>{document.removeEventListener('mousemove',m); document.removeEventListener('mouseup',s)};
        document.addEventListener('mousemove',m); document.addEventListener('mouseup',s); }); }
    makeResizable(document.getElementById('resizer1'), document.getElementById('sidebar'));
    makeResizable(document.getElementById('resizer2'), document.getElementById('main-content'));

    refreshCategories();
</script>
</body>
</html>
