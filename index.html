<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Task Manager | Pro Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --sidebar-bg: #f3f4f6; --main-blue: #4b69ff; --border: #e5e7eb; --red: #dc2626; --text: #444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; width: 100vw; height: 100vh; background: white; overflow: hidden; }

        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        #main-content { width: 350px; background: var(--main-blue); color: white; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; position: relative; }
        #detail-pane { flex: 1; background: #fafafa; border-left: 1px solid var(--border); display: none; flex-direction: column; overflow-y: auto; }

        /* GAP BUFFER */
        #category-list, .task-list-container, .detail-scroll-area { padding-bottom: 120px !important; }

        .sidebar-item { padding: 14px 20px; cursor: pointer; font-size: 16px; color: #374151; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .sidebar-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; border-left: 5px solid var(--main-blue); }

        /* RECURSIVE NESTING STYLES */
        .task-list-container { min-height: 10px; }
        .task-row { 
            background: white; color: #333; margin-top: 8px; padding: 10px; 
            border-radius: 4px; border: 1px solid #eee; position: relative;
        }
        .task-content { display: flex; align-items: center; gap: 10px; }
        .nested-group { margin-left: 25px; padding-top: 5px; border-left: 2px solid #e5e7eb; padding-left: 10px; }

        .detail-section { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; padding: 15px; }
        
        /* DRAG VISUALS */
        .sortable-ghost { opacity: 0.1; background: var(--main-blue) !important; }
        .drag-handle { cursor: grab; color: #ccc; font-size: 18px; padding: 5px; }
        .red-arrow { font-size: 18px; color: var(--red); font-weight: bold; cursor: pointer; margin-left: auto; }

        #global-actions { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: white; border-top: 2px solid var(--border); display: flex; align-items: center; z-index: 10000; box-shadow: 0 -3px 15px rgba(0,0,0,0.1); }
        .btn-bottom { background: none; border: none; cursor: pointer; font-weight: 700; font-size: 14px; color: var(--main-blue); }

        @media (max-width: 900px) { body { overflow-x: auto; } #sidebar, #main-content { min-width: 280px; } #detail-pane { min-width: 320px; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px;"><input type="text" placeholder="Search" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;"></div>
        <div id="category-list"></div>
    </div>

    <div id="main-content">
        <div id="task-list-header" style="padding: 30px 25px 10px 25px; font-size: 22px; font-weight: bold;">Select a List</div>
        <div id="main-task-container" class="task-list-container" style="padding: 10px 25px;"></div>
    </div>

    <div id="detail-pane">
        <div class="detail-header" style="padding:20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #eee;">
            <div id="detail-task-title" style="font-size:18px; font-weight:bold;"></div>
            <button onclick="closeDetails()" style="border:none; background:none; cursor:pointer; font-size:24px; margin-left:auto;">✕</button>
        </div>
        <div class="detail-scroll-area" style="padding:20px;">
            <div class="detail-section">
                <div style="font-weight: bold; margin-bottom: 10px;">Notes</div>
                <div id="editor-wrapper"><div id="notes-editor" style="height:300px; background:white;"></div></div>
            </div>
        </div>
    </div>

    <div id="global-actions">
        <div class="action-cell" style="flex:1; display:flex; justify-content:center;"><button class="btn-bottom" onclick="addCategory()">+ New List</button></div>
        <div class="action-cell" style="flex:1; display:flex; justify-content:center;"><button class="btn-bottom" onclick="promptAddTask()">+ Add Task</button></div>
        <div class="action-cell" style="flex:1; display:flex; justify-content:center;"><button class="btn-bottom" style="color:var(--red);" onclick="saveNotes()">Save Notes</button></div>
    </div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentCategoryId = null, currentTaskId = null, quill = null;

    quill = new Quill('#notes-editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }]] } });

    async function selectCategory(id, name) { 
        currentCategoryId = id; 
        document.getElementById('task-list-header').innerText = name;
        refreshTasks(); 
        refreshCategories(); 
    }

    async function refreshTasks() {
        if (!currentCategoryId) return;
        const { data } = await _supabase.from('subtasks').select('*').eq('category_id', currentCategoryId).order('position', { ascending: true });
        
        const container = document.getElementById('main-task-container');
        container.innerHTML = '';
        renderRecursive(data, null, container);
        initAllSortables();
    }

    // THE RECURSIVE ENGINE: Draws tasks and their children
    function renderRecursive(allTasks, parentId, targetElement) {
        const children = allTasks.filter(t => t.parent_id === parentId);
        children.forEach(t => {
            const row = document.createElement('div');
            row.className = 'task-row';
            row.setAttribute('data-id', t.id);
            row.innerHTML = `
                <div class="task-content">
                    <div class="drag-handle">⋮⋮</div>
                    <div style="flex:1" contenteditable="true" onblur="updateText(${t.id}, this)">${t.task_text}</div>
                    <div class="red-arrow" onclick="openDetails(${t.id}, '${t.task_text.replace(/'/g, "\\'")}')">&gt;</div>
                </div>
                <div class="nested-group" data-parent="${t.id}"></div>
            `;
            targetElement.appendChild(row);
            renderRecursive(allTasks, t.id, row.querySelector('.nested-group'));
        });
    }

    // THE NESTED SORTABLE ENGINE: Connects all groups
    function initAllSortables() {
        const groups = document.querySelectorAll('.task-list-container, .nested-group');
        groups.forEach(group => {
            Sortable.create(group, {
                group: 'nested-tasks', // Allows dragging between levels
                animation: 150,
                fallbackOnBody: true,
                swapThreshold: 0.6,
                handle: '.drag-handle',
                onEnd: async function (evt) {
                    const taskId = evt.item.getAttribute('data-id');
                    const newParentId = evt.to.getAttribute('data-parent') || null;
                    
                    // AJAX UPDATE: Save new position and new parent
                    const rows = evt.to.querySelectorAll(':scope > .task-row');
                    const updates = Array.from(rows).map((row, index) => 
                        _supabase.from('subtasks').update({ 
                            position: index + 1, 
                            parent_id: newParentId 
                        }).eq('id', row.getAttribute('data-id'))
                    );
                    await Promise.all(updates);
                    console.log(`Task ${taskId} moved under parent ${newParentId}`);
                }
            });
        });
    }

    async function openDetails(id, title) {
        currentTaskId = id;
        document.getElementById('detail-task-title').innerText = title;
        document.getElementById('detail-pane').style.display = 'flex';
        const { data } = await _supabase.from('subtasks').select('notes').eq('id', id).single();
        if(data) quill.root.innerHTML = data.notes || '';
    }

    async function updateText(id, el) { await _supabase.from('subtasks').update({ task_text: el.innerText }).eq('id', id); }
    async function saveNotes() { if(!currentTaskId) return; await _supabase.from('subtasks').update({ notes: quill.root.innerHTML }).eq('id', currentTaskId); alert("Saved."); }
    function closeDetails() { document.getElementById('detail-pane').style.display = 'none'; currentTaskId = null; }
    
    async function promptAddTask() {
        if(!currentCategoryId) return;
        const v = prompt("New Task:");
        if(v) {
            await _supabase.from('subtasks').insert([{ category_id: currentCategoryId, task_text: v, position: 999 }]);
            refreshTasks();
        }
    }

    async function addCategory() {
        const n = prompt("List name:");
        if(n) {
            await _supabase.from('categories').insert([{ name: n }]);
            refreshCategories();
        }
    }

    async function refreshCategories() {
        const { data } = await _supabase.from('categories').select('*').order('created_at', { ascending: true });
        document.getElementById('category-list').innerHTML = data.map(c => `
            <div class="sidebar-item ${currentCategoryId == c.id ? 'active' : ''}" onclick="selectCategory(${c.id}, '${c.name.replace(/'/g, "\\'")}')">📋 ${c.name}</div>
        `).join('');
    }

    refreshCategories();
</script>
</body>
</html>
