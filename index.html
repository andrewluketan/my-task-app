<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task App (Singapore Workshop)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary-red: #da291c; /* A clean, workshop-style red */
            --background-grey: #f0f0f0;
            --list-border-color: #eee;
            --text-color-primary: #333;
            --text-color-secondary: #aaa;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--background-grey); margin: 0; display: flex; justify-content: center; padding: 20px; }
        
        .app-container { 
            background: white; width: 100%; max-width: 500px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; 
            border-top: 8px solid var(--primary-red); 
        }
        
        .header { padding: 15px 20px; background: white; border-bottom: 1px solid var(--list-border-color); text-align: center; }
        .header h1 { margin: 0; font-size: 24px; color: var(--text-color-primary); }
        
        .input-area { display: flex; padding: 15px 20px; gap: 10px; background: #fafafa; border-bottom: 1px solid var(--list-border-color); }
        input[type="text"] { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 6px; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: var(--primary-red); }
        button#addBtn { padding: 10px 18px; background: var(--primary-red); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        ul { list-style: none; padding: 0; margin: 0; }
        
        /* Revised li structure for buttons */
        li { 
            display: flex; align-items: center; padding: 12px 20px; 
            border-bottom: 1px solid var(--list-border-color); 
            transition: background 0.2s; 
            position: relative;
        }
        li:hover { background: #f9f9f9; }
        
        /* Stylized Checkbox */
        input[type="checkbox"] { transform: scale(1.4); cursor: pointer; accent-color: var(--primary-red); margin-right: 15px;}
        
        /* The main task text (clickable to edit) */
        .task-text { flex: 1; font-size: 16px; color: var(--text-color-primary); cursor: pointer; padding: 2px 0; display: block;}
        .task-text:hover { color: var(--primary-red); }
        .completed { text-decoration: line-through; color: var(--text-color-secondary); }

        /* The hidden input field that appears during editing */
        .edit-input { flex: 1; display: none; padding: 8px; border: 2px solid var(--primary-red); border-radius: 6px; outline: none; }

        /* Action buttons area */
        .actions { display: flex; gap: 5px; margin-left: 10px;}
        
        /* Base styles for list action buttons */
        .action-btn { 
            border: none; background: transparent; cursor: pointer; font-size: 14px; 
            padding: 5px 8px; border-radius: 4px; transition: background 0.2s; 
        }

        /* Unique styling for Edit and Delete */
        .edit-btn { color: #555; }
        .edit-btn:hover { background: #eee; color: var(--text-color-primary); }

        .delete-btn { color: #cc0000; font-weight: bold;}
        .delete-btn:hover { background: #fee; color: #ff0000; }
        
        /* The buttons shown only during active editing */
        .save-btn { background: #28a745; color: white; font-weight: bold; display: none; margin-left: 5px;}
        .save-btn:hover { background: #218838; }

        .cancel-btn { background: #6c757d; color: white; display: none; margin-left: 5px;}
        .cancel-btn:hover { background: #5a621e; }
        
        /* Utilities for hiding/showing elements during editing */
        li.editing .task-text,
        li.editing .edit-btn,
        li.editing .delete-btn { display: none; }
        
        li.editing .edit-input,
        li.editing .save-btn,
        li.editing .cancel-btn { display: block; }
        li.editing .actions { display: none; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>Singapore Workshop Tasks</h1></div>
    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter a new task...">
        <button id="addBtn" onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    // --- CONFIGURATION ---
    // !!! MAKE SURE YOU PASTE YOUR ACTUAL VALUES HERE !!!
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- REALTIME SUBSCRIPTION (Keeps cross-device sync active) ---
    _supabase
        .channel('schema-db-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'Tasks' }, (payload) => {
            fetchTasks(); // Refresh UI whenever the database changes
        })
        .subscribe();

    // --- APP LOGIC ---

    async function fetchTasks() {
        const { data, error } = await _supabase.from('Tasks').select('*').order('created_at', { ascending: false });
        if (!error) renderTasks(data);
        else console.error("Fetch Error:", error);
    }

    function renderTasks(tasks) {
        const list = document.getElementById('taskList');
        list.innerHTML = tasks.map(t => `
            <li id="task-${t.id}">
                <input type="checkbox" ${t.is_completed ? 'checked' : ''} onchange="toggleTask(${t.id}, ${t.is_completed})">
                
                <!-- Display Area -->
                <span class="task-text ${t.is_completed ? 'completed' : ''}" onclick="startEdit(${t.id})">${t.task_text}</span>
                
                <!-- Edit Area (Hidden by default) -->
                <input type="text" class="edit-input" value="${t.task_text}" id="edit-input-${t.id}">
                
                <!-- Standard Actions -->
                <div class="actions">
                    <button class="action-btn edit-btn" onclick="startEdit(${t.id})">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteTask(${t.id})">Delete</button>
                </div>

                <!-- Active Edit Actions (Hidden by default) -->
                <button class="action-btn save-btn" onclick="saveEdit(${t.id})">Save</button>
                <button class="action-btn cancel-btn" onclick="cancelEdit(${t.id})">Cancel</button>
            </li>
        `).join('');
    }

    async function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return; // Don't add empty tasks
        await _supabase.from('Tasks').insert([{ task_text: input.value.trim() }]);
        input.value = '';
    }

    async function toggleTask(id, currentStatus) {
        await _supabase.from('Tasks').update({ is_completed: !currentStatus }).eq('id', id);
    }

    // --- NEW EDIT AND DELETE LOGIC ---

    // 1. Activate Edit Mode for a specific task
    function startEdit(id) {
        const li = document.getElementById(`task-${id}`);
        // Cancel any other open edits first (optional but cleaner)
        document.querySelectorAll('li.editing').forEach(el => el.classList.remove('editing'));
        li.classList.add('editing');
        
        // Focus and move cursor to the end of the input
        const editInput = document.getElementById(`edit-input-${id}`);
        editInput.focus();
        editInput.setSelectionRange(editInput.value.length, editInput.value.length);

        // Add handler for 'Enter' key to save automatically
        editInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') saveEdit(id);
        });
    }

    // 2. Exit Edit Mode without saving
    function cancelEdit(id) {
        const li = document.getElementById(`task-${id}`);
        li.classList.remove('editing');
        // Reset the input value to the original text
        const originalText = li.querySelector('.task-text').innerText;
        document.getElementById(`edit-input-${id}`).value = originalText;
    }

    // 3. Save the updated task text to Supabase
    async function saveEdit(id) {
        const editInput = document.getElementById(`edit-input-${id}`);
        const newText = editInput.value.trim();
        
        if (newText) {
            const { error } = await _supabase.from('Tasks').update({ task_text: newText }).eq('id', id);
            if (error) console.error("Edit Error:", error);
            // We don't need to manually render; Realtime handles the refresh.
        } else {
            // Optional: If they erased everything, maybe we delete instead? 
            // For now, we'll just cancel the edit.
            cancelEdit(id);
        }
    }

    // 4. Delete the task from Supabase
    async function deleteTask(id) {
        // Confirmation is smart for destructive actions
        if (confirm("Are you sure you want to delete this task?")) {
            const { error } = await _supabase.from('Tasks').delete().eq('id', id);
            if (error) console.error("Delete Error:", error);
            // We don't need to manually render; Realtime handles the refresh.
        }
    }

    // Initial Load
    fetchTasks();
</script>
</body>
</html>
