<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Task Manager | Pro Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --sidebar-bg: #f3f4f6; --main-blue: #4b69ff; --border: #e5e7eb; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: white; }

        /* Column 1: Navigation Sidebar */
        #sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-item { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #374151; display: flex; align-items: center; justify-content: space-between; }
        .sidebar-item:hover { background: #e5e7eb; }
        .sidebar-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 600; border-left: 4px solid var(--main-blue); }

        /* Column 2: Task List (Center) */
        #main-content { flex: 1; display: flex; flex-direction: column; background: var(--main-blue); color: white; transition: 0.3s; }
        #task-list-header { padding: 30px 40px; font-size: 24px; font-weight: bold; }
        #task-items-container { flex: 1; padding: 0 40px; overflow-y: auto; }
        .task-row { background: white; color: #333; margin-bottom: 8px; padding: 15px; border-radius: 4px; display: flex; align-items: center; gap: 15px; cursor: pointer; }

        /* Column 3: Detail Pane (Right) */
        #detail-pane { width: 350px; background: #f9fafb; border-left: 1px solid var(--border); display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .detail-section { background: white; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 15px; padding: 12px; }
        .detail-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; color: #4b5563; cursor: pointer; }
        .detail-item:last-child { border-bottom: none; }
        
        /* Buttons */
        .btn-add { background: none; border: none; color: #4b69ff; cursor: pointer; padding: 10px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <!-- Column 1 -->
    <div id="sidebar">
        <div style="padding: 20px;"><input type="text" placeholder="Search" style="width:100%; padding:8px; border-radius:4px; border:1px solid #ccc;"></div>
        <div id="category-list"></div>
        <button class="sidebar-item" onclick="addCategory()" style="border:none; margin-top:auto; font-weight:bold;">+ New List</button>
    </div>

    <!-- Column 2 -->
    <div id="main-content">
        <div id="task-list-header">Select a Category</div>
        <div id="task-items-container"></div>
        <div style="padding:20px 40px; background: rgba(255,255,255,0.1);">
            <input type="text" id="new-task-input" placeholder="+ Add a task" style="width:100%; padding:12px; background:transparent; border:none; color:white; font-size:16px; outline:none;">
        </div>
    </div>

    <!-- Column 3 -->
    <div id="detail-pane">
        <div style="display:flex; justify-content:flex-end;"><button onclick="closeDetails()" style="border:none; background:none; cursor:pointer;">✕</button></div>
        <h2 id="detail-task-title" style="font-size:18px; margin-top:0;">Task Title</h2>
        
        <div class="detail-section">
            <button class="btn-add" onclick="addSubStep()">+ Add step</button>
            <div id="detail-substeps"></div>
        </div>

        <div class="detail-section">
            <div class="detail-item">🔔 Remind me</div>
            <div class="detail-item">📅 Add due date</div>
            <div class="detail-item">🔁 Repeat</div>
        </div>

        <div class="detail-section">
            <div class="detail-item">📎 Add file</div>
        </div>

        <div class="detail-section" style="flex:1;">
            <textarea id="detail-notes" placeholder="Add note" style="width:100%; height:100%; border:none; resize:none; outline:none; font-family:inherit;"></textarea>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentCategoryId = null;
    let currentTaskId = null;

    async function refreshCategories() {
        const { data } = await _supabase.from('categories').select('*').order('created_at', { ascending: true });
        const list = document.getElementById('category-list');
        list.innerHTML = data.map(cat => `
            <div class="sidebar-item ${currentCategoryId == cat.id ? 'active' : ''}" onclick="selectCategory(${cat.id}, '${cat.name}')">
                <span>🏠 ${cat.name}</span>
            </div>
        `).join('');
    }

    async function selectCategory(id, name) {
        currentCategoryId = id;
        document.getElementById('task-list-header').innerText = name;
        refreshCategories();
        refreshTasks();
    }

    async function refreshTasks() {
        if (!currentCategoryId) return;
        const { data } = await _supabase.from('subtasks').select('*').eq('category_id', currentCategoryId).is('parent_id', null).order('position', { ascending: true });
        const container = document.getElementById('task-items-container');
        container.innerHTML = data.map(task => `
            <div class="task-row" onclick="openDetails(${task.id}, '${task.task_text}')">
                <input type="radio">
                <span>${task.task_text}</span>
            </div>
        `).join('');
    }

    function openDetails(id, title) {
        currentTaskId = id;
        document.getElementById('detail-task-title').innerText = title;
        document.getElementById('detail-pane').style.display = 'flex';
    }

    function closeDetails() {
        document.getElementById('detail-pane').style.display = 'none';
    }

    // Initialize
    refreshCategories();
</script>
</body>
</html>
