<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Task Manager | Pro Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --sidebar-bg: #f3f4f6; --main-blue: #4b69ff; --border: #e5e7eb; --red: #dc2626; --text: #444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: white; overflow: hidden; font-size: 14px; }

        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding-bottom: 60px; flex-shrink: 0; }
        #main-content { width: 350px; display: flex; flex-direction: column; background: var(--main-blue); color: white; border-right: 1px solid rgba(0,0,0,0.1); padding-bottom: 60px; flex-shrink: 0; position: relative; }
        #detail-pane { flex: 1; min-width: 400px; background: #fafafa; border-left: 1px solid var(--border); display: none; flex-direction: column; padding-bottom: 60px; overflow-y: auto;}

        .sidebar-item { padding: 14px 20px; cursor: pointer; font-size: 16px; color: #374151; display: flex; align-items: center; justify-content: space-between; gap: 10px; position: relative; }
        .sidebar-item:hover { background: #e5e7eb; }
        .sidebar-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; border-left: 5px solid var(--main-blue); }

        #task-list-header { padding: 30px 25px 10px 25px; font-size: 22px; font-weight: bold; }
        #task-items-container { flex: 1; padding: 10px 25px; overflow-y: auto; min-height: 100px; }
        
        .task-row { background: white; color: #333; margin-bottom: 2px; padding: 12px 16px; border-radius: 4px; display: flex; align-items: center; gap: 12px; cursor: default; border: 2px solid transparent; transition: all 0.2s; }
        .task-row.active-task { border-color: rgba(255,255,255,0.5); font-weight: 900; background: #f0f4ff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .task-row.active-task .editable-text { font-weight: 900; color: var(--main-blue); }

        .circle-check { width: 18px; height: 18px; border: 1px solid #ccc; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
        .circle-check.checked { background: #4caf50; border-color: #4caf50; }
        .editable-text { outline: none; padding: 2px 6px; border-radius: 2px; cursor: text; flex: 1; width: fit-content; min-width: 50px; }
        .red-arrow { font-size: 18px; color: var(--red); font-weight: bold; cursor: pointer; padding: 0 5px; user-select: none; }

        #global-actions { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: white; border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 1000; }
        .action-cell { height: 100%; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .btn-bottom { background: none; border: none; cursor: pointer; font-weight: 700; font-size: 14px; }
        
        #editor-wrapper { background: white; border: 1px solid var(--border); border-radius: 4px; margin-top: 15px; min-height: 150px; }
        
        /* Drag handle fix */
        .drag-handle { cursor: grab; padding: 10px; font-weight: bold; user-select: none; color: #ccc; -webkit-user-drag: none; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.3; background: #dbeafe !important; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px;"><input type="text" placeholder="Search" id="category-search" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;"></div>
        <div id="category-list"></div>
    </div>
    <div class="resizer" id="resizer1"></div>

    <div id="main-content">
        <div id="task-list-header">Tasks</div>
        <div id="task-items-container"></div>
    </div>
    <div class="resizer" id="resizer2"></div>

    <div id="detail-pane">
        <div class="detail-header">
            <div id="detail-task-title" class="editable-text" contenteditable="true" style="font-size:20px; font-weight:bold;" onblur="updateTaskText(currentTaskId, this)"></div>
            <button onclick="closeDetails()" style="border:none; background:none; cursor:pointer; font-size:20px; margin-left: auto;">✕</button>
        </div>
        <div class="detail-scroll-area">
            <div class="detail-section">
                <div class="detail-item"><span>⏰</span> Remind me <span id="remind-val" class="date-display"></span></div>
                <div class="detail-item"><span>📅</span> Add due date <span id="due-val" class="date-display"></span></div>
            </div>
            <div id="editor-wrapper"><div id="notes-editor"></div></div>
        </div>
    </div>

    <div id="global-actions">
        <div class="action-cell" style="width: 280px;"><button class="btn-bottom" style="color:var(--main-blue);" onclick="addCategory()">+ New List</button></div>
        <div class="action-cell" style="width: 350px;"><button class="btn-bottom" style="color:var(--main-blue);" onclick="promptAddTask()">+ Add A Task</button></div>
        <div class="action-cell" style="flex: 1; justify-content: flex-end;"><button class="btn-bottom" style="color:var(--red);" onclick="saveNotes()">Save Notes</button></div>
    </div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentCategoryId = null, currentTaskId = null, quill = null;

    quill = new Quill('#notes-editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }]] }, placeholder: '+ Add Notes' });

    async function saveNotes() { 
        if(!currentTaskId) return;
        const notesContent = quill.root.innerHTML;
        const { error } = await _supabase.from('subtasks').update({ notes: notesContent }).eq('id', currentTaskId);
        if(!error) alert("Notes saved successfully!");
    }

    async function selectCategory(id, name) { 
        currentCategoryId = id; 
        document.getElementById('task-list-header').innerText = name;
        refreshTasks(); 
        refreshCategories(); 
        closeDetails(); 
    }

    async function refreshTasks() {
        if (!currentCategoryId) return;
        const { data } = await _supabase.from('subtasks')
            .select('*')
            .eq('category_id', currentCategoryId)
            .is('parent_id', null)
            .order('position', { ascending: true });

        const container = document.getElementById('task-items-container');
        // draggable="false" prevents browser-default ghosting
        container.innerHTML = data.map(t => `
            <div class="task-row ${currentTaskId == t.id ? 'active-task' : ''}" data-id="${t.id}" draggable="false">
                <div class="drag-handle" draggable="false">⋮⋮</div>
                <div class="circle-check ${t.is_completed ? 'checked' : ''}" onclick="toggleCheck(${t.id}, ${t.is_completed})"></div>
                <div class="editable-text" contenteditable="true" onblur="updateTaskText(${t.id}, this)">${t.task_text}</div>
                <div class="red-arrow" onclick="openDetails(${t.id}, '${t.task_text.replace(/'/g, "\\'")}')">&gt;</div>
            </div>`).join('');

        // Strict re-initialization with fallback to JS-based drag
        Sortable.create(container, {
            handle: '.drag-handle',
            animation: 150,
            forceFallback: true, 
            fallbackClass: "sortable-fallback",
            ghostClass: 'sortable-ghost',
            onStart: () => { document.body.style.cursor = 'grabbing'; },
            onEnd: async function () {
                document.body.style.cursor = 'default';
                const rows = container.querySelectorAll('.task-row');
                const updates = Array.from(rows).map((row, index) => {
                    return _supabase.from('subtasks').update({ position: index }).eq('id', row.getAttribute('data-id'));
                });
                await Promise.all(updates);
            }
        });
    }

    async function refreshCategories() {
        const { data } = await _supabase.from('categories').select('*').order('created_at', { ascending: true });
        document.getElementById('category-list').innerHTML = data.map(c => `
            <div class="sidebar-item ${currentCategoryId == c.id ? 'active' : ''}" onclick="selectCategory(${c.id}, '${c.name.replace(/'/g, "\\'")}')">
                <span>📋 ${c.name}</span>
            </div>`).join('');
    }

    async function updateTaskText(id, el) { await _supabase.from('subtasks').update({ task_text: el.innerText }).eq('id', id); }
    async function toggleCheck(id, s) { await _supabase.from('subtasks').update({ is_completed: !s }).eq('id', id); refreshTasks(); }
    async function promptAddTask() { const v = prompt("New Task:"); if(v) { await _supabase.from('subtasks').insert([{ category_id: currentCategoryId, task_text: v }]); refreshTasks(); } }
    async function addCategory() { const n = prompt("List name:"); if(n) { await _supabase.from('categories').insert([{ name: n }]); refreshCategories(); } }
    function closeDetails() { document.getElementById('detail-pane').style.display = 'none'; currentTaskId = null; refreshTasks(); }
    
    refreshCategories();
</script>
</body>
</html>
