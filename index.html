<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Task Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        :root { --milwaukee-red: #da291c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        .category-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 30px; border-top: 6px solid var(--milwaukee-red); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .subtask-list { margin-left: 25px; border-left: 2px solid #eee; padding-left: 15px; margin-top: 5px; }
        .subtask-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; background: #fff; }
        .btn { cursor: pointer; padding: 8px 15px; border: none; border-radius: 6px; font-weight: 600; }
        .btn-main { background: var(--milwaukee-red); color: white; }
        .btn-small { padding: 4px 8px; font-size: 11px; background: #eee; border: 1px solid #ddd; border-radius: 4px; }
        .editor-container { background: #fff; height: 150px; border-radius: 0 0 8px 8px; }
        .task-text { flex: 1; font-size: 14px; }
        .completed { text-decoration: line-through; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
        <h1>Strategic Project Manager</h1>
        <button class="btn btn-main" onclick="addCategory()">+ New Category</button>
    </div>
    <div id="app-root"></div>
</div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let editors = {}; 

    async function addCategory() {
        const name = prompt("Enter Category Name:");
        if (name) await _supabase.from('categories').insert([{ name }]);
        refreshUI();
    }

    async function addSubTask(catId, parentId = null) {
        const text = prompt("Task description:");
        if (!text) return;
        
        // Ensure IDs are treated as numbers for the database
        const { error } = await _supabase.from('subtasks').insert([{ 
            category_id: Number(catId), 
            parent_id: parentId ? Number(parentId) : null, 
            task_text: text 
        }]);
        
        if (error) alert("Save Error: " + error.message);
        refreshUI();
    }

    async function toggleComplete(id, status) {
        await _supabase.from('subtasks').update({ is_completed: !status }).eq('id', id);
        refreshUI();
    }

    async function deleteSubTask(id) {
        if (confirm("Delete this task and all its sub-tasks?")) {
            await _supabase.from('subtasks').delete().eq('id', id);
            refreshUI();
        }
    }

    async function promoteTask(taskId, currentParentId) {
        if (!currentParentId) return; 
        const { data: parent } = await _supabase.from('subtasks').select('parent_id').eq('id', Number(currentParentId)).single();
        await _supabase.from('subtasks').update({ parent_id: parent ? parent.parent_id : null }).eq('id', Number(taskId));
        refreshUI();
    }

    async function saveNotes(catId) {
        const content = editors[catId].root.innerHTML;
        await _supabase.from('categories').update({ notes: content }).eq('id', Number(catId));
        alert("Notes saved successfully.");
    }

    async function refreshUI() {
        const { data: cats, error } = await _supabase.from('categories').select('*').order('created_at', { ascending: false });
        if (error) return;

        const root = document.getElementById('app-root');
        root.innerHTML = '';
        editors = {}; 

        for (const cat of cats) {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h2 style="margin:0">${cat.name}</h2>
                    <button class="btn-small" style="color:red" onclick="deleteCategory(${cat.id})">Delete Category</button>
                </div>
                <div id="editor-${cat.id}" class="editor-container">${cat.notes || ''}</div>
                <button class="btn btn-small" style="margin-top:10px;" onclick="saveNotes(${cat.id})">Save Project Notes</button>
                <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                <div id="tasks-for-${cat.id}"></div>
                <button class="btn btn-main" style="margin-top:15px; font-size:12px;" onclick="addSubTask(${cat.id})">+ Add Main Task</button>
            `;
            root.appendChild(card);
            
            editors[cat.id] = new Quill(`#editor-${cat.id}`, {
                theme: 'snow',
                modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }], ['clean']] }
            });

            // Trigger the initial load for top-level tasks
            renderTree(cat.id, null, `tasks-for-${cat.id}`);
        }
    }

    async function renderTree(catId, parentId, containerId) {
        let query = _supabase.from('subtasks')
            .select('*')
            .eq('category_id', Number(catId))
            .order('created_at', { ascending: true });

        // Handle the NULL vs Value check for the parent_id column
        if (parentId === null) {
            query = query.is('parent_id', null);
        } else {
            query = query.eq('parent_id', Number(parentId));
        }

        const { data: tasks } = await query;
        const container = document.getElementById(containerId);
        if (!tasks || !container) return;

        // Clear "Loading..." or old content if this is the top level
        if (parentId === null) container.innerHTML = '';

        for (const task of tasks) {
            const item = document.createElement('div');
            item.className = 'subtask-item';
            item.innerHTML = `
                <input type="checkbox" ${task.is_completed ? 'checked' : ''} onchange="toggleComplete(${task.id}, ${task.is_completed})">
                <span class="task-text ${task.is_completed ? 'completed' : ''}">${task.task_text}</span>
                <button class="btn-small" onclick="addSubTask(${catId}, ${task.id})">+ Sub</button>
                <button class="btn-small" onclick="promoteTask(${task.id}, ${task.parent_id})">↑ Up</button>
                <button class="btn-small" style="color:red" onclick="deleteSubTask(${task.id})">×</button>
            `;
            
            const subContainer = document.createElement('div');
            subContainer.className = 'subtask-list';
            subContainer.id = `children-of-${task.id}`;
            
            container.appendChild(item);
            container.appendChild(subContainer);
            
            // Recursive call: find tasks where parent_id is THIS task's ID
            await renderTree(catId, task.id, subContainer.id);
        }
    }

    async function deleteCategory(id) {
        if (confirm("Delete this category?")) {
            await _supabase.from('categories').delete().eq('id', id);
            refreshUI();
        }
    }

    refreshUI();
</script>
</body>
</html>
