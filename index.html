<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strategic Task Manager | Pro Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root { --sidebar-bg: #f3f4f6; --main-blue: #4b69ff; --border: #e5e7eb; --red: #dc2626; --text: #444; }
        
        /* FIX: Ensure the main container doesn't collapse or freeze */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            display: flex; 
            width: 100vw;
            height: 100vh; 
            background: white; 
            overflow: hidden; 
        }

        /* SIDEBAR, MAIN CONTENT, & DETAIL PANE */
        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; padding-bottom: 80px; }
        #main-content { width: 350px; background: var(--main-blue); color: white; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; padding-bottom: 80px; position: relative; }
        #detail-pane { flex: 1; background: #fafafa; border-left: 1px solid var(--border); display: none; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }

        .sidebar-item { padding: 14px 20px; cursor: pointer; font-size: 16px; color: #374151; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .sidebar-item.active { background: #dbeafe; color: #1d4ed8; font-weight: 700; border-left: 5px solid var(--main-blue); }

        #task-list-header { padding: 30px 25px 10px 25px; font-size: 22px; font-weight: bold; }
        #task-items-container { padding: 10px 25px; display: block !important; }
        
        .task-row { 
            background: white; color: #333; margin-bottom: 12px; padding: 12px 16px; 
            border-radius: 4px; display: flex; align-items: center; gap: 12px; border: 1px solid #eee;
            position: relative; user-select: none;
        }

        /* FLOATING FOOTER FIX */
        #global-actions { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 65px; 
            background: white; 
            border-top: 2px solid var(--border); 
            display: flex; 
            align-items: center; 
            z-index: 10000;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.1);
        }

        .action-cell { flex: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid #eee; }
        .btn-bottom { background: none; border: none; cursor: pointer; font-weight: 700; font-size: 14px; color: var(--main-blue); }

        /* UI ELEMENTS */
        .drag-handle { cursor: grab; padding: 10px; color: #ccc; font-size: 20px; }
        .circle-check { width: 18px; height: 18px; border: 1px solid #ccc; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
        .circle-check.checked { background: #4caf50; border-color: #4caf50; }
        .editable-text { outline: none; padding: 2px 6px; flex: 1; }
        .red-arrow { font-size: 18px; color: var(--red); font-weight: bold; cursor: pointer; }

        /* MOBILE FIX: Allow horizontal scrolling if screen is too small */
        @media (max-width: 900px) {
            body { overflow-x: auto; }
            #sidebar, #main-content { min-width: 280px; }
            #detail-pane { min-width: 320px; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 20px;"><input type="text" placeholder="Search" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;"></div>
        <div id="category-list"></div>
    </div>

    <div id="main-content">
        <div id="task-list-header">Select a List</div>
        <div id="task-items-container"></div>
    </div>

    <div id="detail-pane">
        <div class="detail-header" style="padding:20px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #eee;">
            <div id="detail-task-title" class="editable-text" contenteditable="true" style="font-size:18px; font-weight:bold;"></div>
            <button onclick="closeDetails()" style="border:none; background:none; cursor:pointer; font-size:24px; margin-left:auto;">✕</button>
        </div>
        <div id="editor-wrapper" style="padding:20px;"><div id="notes-editor" style="height:300px; background:white;"></div></div>
    </div>

    <div id="global-actions">
        <div class="action-cell"><button class="btn-bottom" onclick="addCategory()">+ New List</button></div>
        <div class="action-cell"><button class="btn-bottom" onclick="promptAddTask()">+ Add Task</button></div>
        <div class="action-cell" style="border-right:none;"><button class="btn-bottom" style="color:var(--red);" onclick="saveNotes()">Save Notes</button></div>
    </div>

<script>
    const SUPABASE_URL = 'https://jzgdbwhgaaxjsopobxrw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_t6RR-NqEVb66EX_O3Q8x7A_DGJ9xR3l'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentCategoryId = null, currentTaskId = null, quill = null;

    quill = new Quill('#notes-editor', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{ 'list': 'bullet' }]] }, placeholder: '+ Add Notes' });

    async function selectCategory(id, name) { 
        currentCategoryId = id; 
        document.getElementById('task-list-header').innerText = name;
        refreshTasks(); 
        refreshCategories(); 
        closeDetails();
    }

    async function refreshTasks() {
        if (!currentCategoryId) return;
        const { data } = await _supabase.from('subtasks').select('*').eq('category_id', currentCategoryId).is('parent_id', null).order('position', { ascending: true });
        const container = document.getElementById('task-items-container');
        container.innerHTML = data.map(t => `
            <div class="task-row" data-id="${t.id}">
                <div class="drag-handle">⋮⋮</div>
                <div class="circle-check ${t.is_completed ? 'checked' : ''}" onclick="toggleCheck(${t.id}, ${t.is_completed})"></div>
                <div class="editable-text" contenteditable="true" onblur="updateTaskText(${t.id}, this)">${t.task_text}</div>
                <div class="red-arrow" onclick="openDetails(${t.id}, '${t.task_text.replace(/'/g, "\\'")}')">&gt;</div>
            </div>`).join('');

        Sortable.create(container, {
            handle: '.drag-handle',
            animation: 200,
            forceFallback: true,
            onMove: (evt) => evt.related.className.indexOf('task-row') !== -1,
            onEnd: async function () {
                const rows = container.querySelectorAll('.task-row');
                const updates = Array.from(rows).map((row, index) => _supabase.from('subtasks').update({ position: index + 1 }).eq('id', row.getAttribute('data-id')));
                await Promise.all(updates);
            }
        });
    }

    async function refreshCategories() {
        const { data } = await _supabase.from('categories').select('*').order('created_at', { ascending: true });
        document.getElementById('category-list').innerHTML = data.map(c => `
            <div class="sidebar-item ${currentCategoryId == c.id ? 'active' : ''}" onclick="selectCategory(${c.id}, '${c.name.replace(/'/g, "\\'")}')">
                📋 ${c.name}
            </div>`).join('');
    }

    async function updateTaskText(id, el) { await _supabase.from('subtasks').update({ task_text: el.innerText }).eq('id', id); }
    async function toggleCheck(id, s) { await _supabase.from('subtasks').update({ is_completed: !s }).eq('id', id); refreshTasks(); }
    async function promptAddTask() { 
        if(!currentCategoryId) { alert("Please select a list first."); return; }
        const v = prompt("New Task:"); 
        if(v) { await _supabase.from('subtasks').insert([{ category_id: currentCategoryId, task_text: v, position: 999 }]); refreshTasks(); } 
    }
    async function addCategory() { const n = prompt("List name:"); if(n) { await _supabase.from('categories').insert([{ name: n }]); refreshCategories(); } }
    
    async function openDetails(id, title) {
        currentTaskId = id;
        document.getElementById('detail-task-title').innerText = title;
        document.getElementById('detail-pane').style.display = 'flex';
        const { data } = await _supabase.from('subtasks').select('*').eq('id', id).single();
        if(data) quill.root.innerHTML = data.notes || '';
    }
    
    function closeDetails() { document.getElementById('detail-pane').style.display = 'none'; currentTaskId = null; }
    async function saveNotes() { if(!currentTaskId) return; await _supabase.from('subtasks').update({ notes: quill.root.innerHTML }).eq('id', currentTaskId); alert("Notes saved."); }
    
    refreshCategories();
</script>
</body>
</html>
